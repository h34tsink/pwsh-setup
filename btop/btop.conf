#? Config file for btop4win

# Show all boxes: cpu, memory, network, processes, disk
shown_boxes = "cpu mem net proc disk"

# Color theme (empty = default)
color_theme = ""

# Update interval in milliseconds
update_ms = 2000

# Use braille characters for graphs
graph_symbol = "braille"

# Rounded corners on boxes
rounded_corners = true

# Process view
proc_sorting = "cpu lazy"
proc_tree = false
proc_per_core = false
proc_mem_bytes = true
proc_gradient = true

# CPU options
cpu_graph_upper = "Auto"
cpu_graph_lower = "Auto"
cpu_single_graph = false

# Memory options
mem_graphs = true
mem_below_net = false

# Network options
net_download = 100
net_upload = 100
net_auto = true
net_sync = true

# Disk options
disk_free_prct = false
use_fstab = false
only_physical = true

# General
show_battery = true
vim_keys = false
log_level = "WARNING"
